<!DOCTYPE html>
<!--
  Multi‑stimulus League of Legends cue search experiment

  This HTML file sets up a generic jsPsych environment and loads the
  experiment definition from `experiment.js`. The experiment iterates
  through multiple stimuli (screenshots) using a common procedure to
  reveal cues and record the participant's decision. All jsPsych
  libraries are loaded from a CDN【779455033719145†L243-L264】; ensure an
  internet connection is available when running this file, or host
  local copies of the libraries and update the `<script>` tags.
-->
<html>
  <head>
    <meta charset="UTF-8">
    <title>League Decision Multi‑Stimulus</title>
    <!-- Load jsPsych core and plugins -->
    <!-- Load jsPsych core and a few plugins from a CDN -->
    <script src="jatos.js"></script>
    <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.js"></script>
    <!-- Core plugins used in this experiment -->
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0/dist/index.browser.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3/dist/index.browser.js"></script>
    <!-- jsPsych stylesheet for basic styling -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
        background-color: #f7f7f7;
      }
      h3 {
        margin-top: 0.5em;
      }
      .screen-wrap {
        margin: 0 auto;
        max-width: 900px;
      }
      .screenshot-container {
        position: relative;
        display: inline-block;
        width: 100%;
        overflow: hidden;
      }
      .screenshot-container img {
        display: block;
        width: 100%;
        height: auto;
      }
      .cue-overlay {
        position: absolute;
        background: #000;
        opacity: 1;
        border: 1px solid rgba(255, 255, 255, 0.35);
        cursor: pointer;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      button.cue-overlay {
        appearance: none;
        -webkit-appearance: none;
        border-radius: 0;
      }
      .baseline-panel,
      .cue-panel,
      .decision-panel {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
      }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .warning-text {
        color: #d00;
        font-size: 0.9em;
      }
      .hint {
        color: #555;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div id="jspsych-target"></div>
    <script src="experiment.js"></script>
  </body>
</html>
